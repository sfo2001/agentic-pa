# Repo-wide lint config (focused-review F-8) — locks in the existing style and
# lets CI enforce import order, pyflakes, pyupgrade, and bugbear checks.
line-length = 100
target-version = "py310"

# .cmd / .sh / .ps1 — these are platform shims, not Python. Ruff has no
# grammar for them and will report spurious parse errors. Their structure
# is covered by structural tests (see tests/launcher/test_preflight_env.py).
#
# .mjs — JS test harness for frontend/ui/app.js (tests/frontend/test_app_js.*);
# ruff has no JS grammar and the file is gated by `node --check` + the
# pytest wrapper that subprocess-runs it, not by ruff.
extend-exclude = ["*.cmd", "*.sh", "*.ps1", "*.mjs"]

[lint]
select = ["E", "F", "I", "UP", "B"]
# E501: line length is advisory (long error strings / signatures); `ruff format`
# handles wrapping when desired. B008: FastAPI's `param = File(...)`/`Depends(...)`
# default-argument idiom is intentional, not a bug. Other rules are enforced.
ignore = ["E501", "B008"]
