name: CI

on:
  push:
  pull_request:

# Third-party actions are pinned to commit SHAs (not floating tags) so a hijacked
# or re-pointed tag cannot silently swap the action. Trailing comment = the tag.
jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Catch Windows-specific failures on the primary Python (one job is enough;
        # OS issues rarely depend on the minor version).
        include:
          - os: windows-latest
            python-version: "3.12"
    defaults:
      run:
        # Use bash on every OS (Git Bash on Windows) so the install/test steps are
        # identical cross-platform.
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packages + dev deps
        run: |
          python -m pip install --upgrade pip
          # llm-wiki-tools is a sibling project on GitHub, NOT on PyPI. Install it
          # from its repo (the bare name on PyPI is an unrelated package — dependency
          # confusion). It backs notes_search and the lwt-based upload converter.
          pip install "git+https://github.com/sfo2001/llm-wiki-tools.git"
          pip install -e ./agenda -e ./frontend -e ./presenter ruff
          pip install -r agenda/requirements-dev.txt -r frontend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check agenda frontend launcher notes-mvp presenter tests

      - name: Unit tests (pytest)
        # The end-to-end smoke under tests/smoke/ needs a live model and is not
        # collected here (it has no test_ functions); only the unit suite runs.
        run: pytest tests/ -q
